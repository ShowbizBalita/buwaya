    <title>Nagulat ang isang lalaki matapos niyang makita ang isang kakaibang nilalang na lumabas mula sa itlog ng buwaya na kanyang inaalagaan malapit sa latian.
Sa video na kumalat, makikitang unti-unting nabiyak ang itlog, at nang silipin niya ito ay tila may katawan ng maliit na buwaya ngunit ang ulo ay kahawig ng mukha ng tao. Dahil sa kakaibang anyo nito, napaatras pa ang lalaki bago niya ito maingat na pulutin habang nakamasid ang inang buwaya sa tabi.
Ayon sa ilang nakakita, tahimik lamang ang paligid habang nakatitig ang mga tao sa kakaibang nilalang, na para bang may misteryong hindi maipaliwanag kung paano ito nangyari. Dahil dito, mabilis itong naging usap-usap sa kanilang lugar.</title>
